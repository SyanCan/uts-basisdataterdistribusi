services:
  mysql-master:
    image: mysql:8.0
    container_name: utsbtd-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uts_basisdataterdistribusi
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-shard-1:
    image: mysql:8.0
    container_name: utsbtd-mysql-shard-1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uts_basisdataterdistribusi
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-shard-2:
    image: mysql:8.0
    container_name: utsbtd-mysql-shard-2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uts_basisdataterdistribusi
    ports:
      - "3312:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-shard-3:
    image: mysql:8.0
    container_name: utsbtd-mysql-shard-3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uts_basisdataterdistribusi
    ports:
      - "3313:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-shard-4:
    image: mysql:8.0
    container_name: utsbtd-mysql-shard-4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uts_basisdataterdistribusi
    ports:
      - "3314:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  mysql-shard-5:
    image: mysql:8.0
    container_name: utsbtd-mysql-shard-5
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uts_basisdataterdistribusi
    ports:
      - "3315:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  manager:
    build: ./manager
    container_name: utsbtd-manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mysql-master
      - mysql-shard-1
      - mysql-shard-2
      - mysql-shard-3
      - mysql-shard-4
      - mysql-shard-5

  watcher:
    image: utsbtd-basisdata-manager:latest
    container_name: utsbtd-watcher
    command: python /app/watcher.py
    volumes:
      - ./manager:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - mysql-master
      - mysql-shard-1
      - mysql-shard-2
      - mysql-shard-3
      - mysql-shard-4
      - mysql-shard-5